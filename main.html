<!DOCTYPE html>
<html>
<head>
<script type="text/javascript" src="https://getfirebug.com/firebug-lite-debug.js"></script>
<meta name="description" content="CS4406 Computer Graphics - Exercise #5" />
  	<meta charset="utf-8" />
	<title>Unit 5 Three.js</title>
<meta charset=utf-8 />
<title>CS4406 Computer Graphics - Exercise #5</title>
  
<style id="jsbin-css">

</style>
</head>
<body>
<div id="container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  // --- Setup Scene, Camera, Renderer ---
  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a1a);

  var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
  camera.position.set(0, 8, 18); // Fixed camera position
  camera.lookAt(0, 3, 0);        // Look at the molecule center

  var renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  
  // Enable shadows
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  document.getElementById('container').appendChild(renderer.domElement);
	// ----------------------------------------------------------------------------------------
	//  END OF THE STANDARD CODE FOR THE ASSIGNMENT
	//  Following this is where you must place your own custom code to complete the assignment
	// ----------------------------------------------------------------------------------------
  // --- 1. Lighting ---
  const ambientLight = new THREE.AmbientLight(0x404040, 2); 
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
  directionalLight.position.set(5, 10, 5); 
  directionalLight.castShadow = true; // Light casts shadow
  
  // Optimize shadow map
  directionalLight.shadow.mapSize.width = 1024;
  directionalLight.shadow.mapSize.height = 1024;
  scene.add(directionalLight);

  // --- Methane Group ---
  const molecule = new THREE.Group();
  molecule.position.y = 3; 
  scene.add(molecule);

  // --- 2. Materials ---
  const carbonMaterial = new THREE.MeshPhongMaterial({ color: 0xcc0000, shininess: 80 });
  const hydrogenMaterial = new THREE.MeshPhongMaterial({ color: 0x0000ff, shininess: 50 });
  const bondMaterial = new THREE.MeshStandardMaterial({ color: 0x888888 });

  // --- 3. Carbon Atom ---
  const carbon = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), carbonMaterial);
  carbon.castShadow = true; 
  molecule.add(carbon);

  // --- 4. Hydrogen Atoms & Bonds ---
  const bondLength = 2.5;
  const hydrogenRadius = 0.5;
  const positions = [
    new THREE.Vector3(1, 1, 1).normalize().multiplyScalar(bondLength),
    new THREE.Vector3(-1, -1, 1).normalize().multiplyScalar(bondLength),
    new THREE.Vector3(-1, 1, -1).normalize().multiplyScalar(bondLength),
    new THREE.Vector3(1, -1, -1).normalize().multiplyScalar(bondLength)
  ];

  positions.forEach((pos) => {
    // Hydrogen
    const hydrogen = new THREE.Mesh(new THREE.SphereGeometry(hydrogenRadius, 16, 16), hydrogenMaterial);
    hydrogen.position.copy(pos);
    hydrogen.castShadow = true; 
    molecule.add(hydrogen);

    // Bond
    const distance = pos.length();
    const bond = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, distance, 12), bondMaterial);
    bond.position.copy(pos).multiplyScalar(0.5); 
    bond.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), pos.clone().normalize());
    bond.castShadow = true; 
    molecule.add(bond);
  });
  
  // --- 5. Static Plane ---
  // Using MeshPhongMaterial so it can receive shadows (MeshBasicMaterial cannot)
  var planeGeometry = new THREE.PlaneGeometry(30, 30);
  var planeMaterial = new THREE.MeshPhongMaterial({ color: 0x006600, side: THREE.DoubleSide });
  var plane = new THREE.Mesh(planeGeometry, planeMaterial);
  plane.rotation.x = -Math.PI / 2;
  plane.receiveShadow = true; // [SHADOW] Plane receives shadow
  scene.add(plane);

  // --- 6. CUSTOM MOUSE CONTROLS (Molecule Rotation Only) ---
  let isDragging = false;
  let previousMousePosition = { x: 0, y: 0 };

  // When mouse is pressed
  document.addEventListener('mousedown', function(e) {
      isDragging = true;
      previousMousePosition = { x: e.clientX, y: e.clientY };
  });

  // When mouse is moved
  document.addEventListener('mousemove', function(e) {
      if (isDragging) {
          const deltaMove = {
              x: e.clientX - previousMousePosition.x,
              y: e.clientY - previousMousePosition.y
          };

          // Rotate the molecule based on mouse movement
          // We rotate around Y (left/right) and X (up/down)
          molecule.rotation.y += deltaMove.x * 0.005;
          molecule.rotation.x += deltaMove.y * 0.005;

          previousMousePosition = { x: e.clientX, y: e.clientY };
      }
  });

  // When mouse is released
  document.addEventListener('mouseup', function(e) {
      isDragging = false;
  });
	// Standard functions for rendering the scene.  Notice how we have the animate function 
	// which submits a call to requestAnimationFrame to call animate.   This creates a loop
	// that will render the scene again whenever something within the scene changes.
  // --- Animation Loop ---
  function animate() {
    requestAnimationFrame(animate);
    
    // Note: No auto-rotation here, and no controls.update()
    // The renderer just draws the scene as is.
    
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
